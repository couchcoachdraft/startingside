<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AFL Fantasy Watchlist</title>
  <style>
    :root{
      --bg:#0b1220; --card:#111a2e; --text:#e7eefc; --muted:#a9b7d6;
      --line:rgba(231,238,252,.14); --accent:#7aa2ff;

      --qcol:72px; --namecol:210px; --notescol:340px; --countcol:70px; --actionscol:100px;
      --stickyTop: 140px;
    }
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);}
    header{
      padding:18px 16px;border-bottom:1px solid var(--line);position:sticky;top:0;
      background:linear-gradient(180deg,rgba(11,18,32,.98),rgba(11,18,32,.90));
      backdrop-filter:blur(6px);z-index:20;
    }
    header h1{margin:0 0 6px 0;font-size:18px;}
    header p{margin:0;color:var(--muted);font-size:13px;line-height:1.4;}
    main{padding:16px;display:grid;gap:14px;}

    .toolbar{
      background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;
      position:sticky; top:72px; z-index:15;
    }
    .toolbar-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:space-between;}
    .left,.right{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
    .status{margin-top:8px;color:var(--muted);font-size:12px;min-height:16px;}

    input[type="text"]{
      background:rgba(255,255,255,.06);border:1px solid var(--line);color:var(--text);
      padding:8px 10px;border-radius:10px;outline:none;width:220px;
    }
    button{
      background:rgba(122,162,255,.16);color:var(--text);
      border:1px solid rgba(122,162,255,.35);padding:8px 10px;border-radius:10px;cursor:pointer;
    }
    button:hover{border-color:rgba(122,162,255,.65);}
    .danger{background:rgba(255,110,110,.12);border-color:rgba(255,110,110,.35);}
    .pill{display:inline-block;padding:2px 8px;border-radius:999px;border:1px solid var(--line);color:var(--muted);font-size:12px;margin-left:8px;}
    .small{font-size:12px;color:var(--muted);}

    .section{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;}
    .section-head{
      display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 12px;
      border-bottom:1px solid var(--line);flex-wrap:wrap;
    }
    .section-head h2{margin:0;font-size:14px;letter-spacing:.6px;}
    .add{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}

    .table-wrap{overflow-x:auto;}
    table{
      border-collapse:collapse;
      width:100%;
      table-layout:fixed;
      min-width: calc(var(--namecol) + (10 * var(--qcol)) + var(--notescol) + var(--countcol) + var(--actionscol));
    }
    col.name { width: var(--namecol); }
    col.q { width: var(--qcol); }
    col.notes { width: var(--notescol); }
    col.count { width: var(--countcol); }
    col.actions { width: var(--actionscol); }

    th, td{
      border-bottom:1px solid var(--line);
      padding:10px 8px;
      vertical-align:middle;
      font-size:13px;
      overflow:hidden;
      text-overflow:ellipsis;
      /* ensure table layout stays table-like even if some CSS leaks in */
      display: table-cell;
    }
    th{
      position:sticky;
      top: var(--stickyTop);
      background:rgba(17,26,46,.98);
      z-index:10;
      text-align:left;
      white-space:nowrap;
    }
    th.q, td.q{ text-align:center; }

    td.player{font-weight:600;white-space:nowrap;}
    td.count, th.count{text-align:center;font-weight:700;}
    td.actions, th.actions{text-align:center;white-space:nowrap;}

    input[type="checkbox"]{
      width:18px;height:18px;accent-color:var(--accent);cursor:pointer;
    }

    .notes-input{
      width:100%;
      box-sizing:border-box;
      background:rgba(255,255,255,.06);
      border:1px solid var(--line);
      color:var(--text);
      padding:8px 10px;
      border-radius:10px;
      outline:none;
    }
    .hint{color:var(--muted);font-size:12px;padding:10px 12px;}
  </style>
</head>
<body>
  <header id="page-header">
    <h1>AFL Fantasy Watchlist Checklist</h1>
    <p>Add players by line. Checkboxes sit under each question. Notes included. Export/Import to move between devices.</p>
  </header>

  <main>
    <section class="toolbar" id="toolbar">
      <div class="toolbar-row">
        <div class="left">
          <button id="btn-export">Export .json</button>

          <input id="file-import" type="file" accept="application/json,.json" style="display:none" />
          <button id="btn-import">Import .json (replace)</button>

          <button class="danger" id="btn-wipe">Wipe local data</button>
        </div>
        <div class="right small">Export saves a file you can store anywhere</div>
      </div>
      <div class="status" id="status"></div>
    </section>

    <div id="app"></div>
  </main>

  <script>
    const QUESTIONS = [
      "Best 22 lock?",
      "Role lock?",
      "No role threat?",
      "Team needs him there?",
      "Usage repeatable?",
      "Coach supports role?",
      "Scores independent?",
      "Scores when team loses?",
      "Injury risk ok?",
      "Tag resilient?"
    ];

    const QUESTION_TOOLTIPS = [
      "Best 22 lock (automatic selection)?",
      "Role lock (stable role week-to-week)?",
      "No direct role threat (teammate cannibalisation)?",
      "Team needs him there (structural)?",
      "Primary usage repeatable (CBAs/role minutes)?",
      "Coach history supports role stability?",
      "Scoring independent (wins own ball / not reliant on being fed)?",
      "Scores okay when team loses?",
      "Injury risk reasonable?",
      "Tag resilient (doesn’t crater under attention)?"
    ];

    const POSITIONS = [
      { key: "MIDS", title: "MIDS" },
      { key: "RUC",  title: "RUC" },
      { key: "DEF",  title: "DEF" },
      { key: "FWD",  title: "FWD" }
    ];

    const STORAGE_KEY = "afl_watchlist_v6";

    let state = loadState() || defaultState();
    saveState(state);

    function setStatus(msg){ document.getElementById("status").textContent = msg || ""; }
    function defaultState(){ return { MIDS: [], RUC: [], DEF: [], FWD: [] }; }

    function normalizeState(raw){
      const out = defaultState();
      for(const pos of POSITIONS){
        const arr = (raw && Array.isArray(raw[pos.key])) ? raw[pos.key] : [];
        out[pos.key] = arr.map(p => {
          const checks = Array(QUESTIONS.length).fill(false);
          if(Array.isArray(p.checks)){
            for(let i=0;i<Math.min(p.checks.length, checks.length);i++) checks[i]=!!p.checks[i];
          }
          return {
            id: (typeof p.id==="string" && p.id) ? p.id : (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()+Math.random())),
            name: (typeof p.name==="string" ? p.name : "").trim() || "Unnamed",
            notes: (typeof p.notes==="string") ? p.notes : "",
            checks
          };
        });
      }
      return out;
    }

    function loadState(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return null;
        return normalizeState(JSON.parse(raw));
      }catch{ return null; }
    }
    function saveState(s){ localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }

    function newPlayer(name){
      return {
        id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()+Math.random()),
        name: name.trim(),
        notes: "",
        checks: Array(QUESTIONS.length).fill(false)
      };
    }

    function scorePlayer(p){ return p.checks.reduce((a,v)=>a+(v?1:0),0); }

    function updateStickyTop(){
      const header = document.getElementById("page-header");
      const toolbar = document.getElementById("toolbar");
      const stickyTop = (header?.offsetHeight || 0) + (toolbar?.offsetHeight || 0) + 16;
      document.documentElement.style.setProperty("--stickyTop", stickyTop + "px");
    }

    function render(){
      const app = document.getElementById("app");
      app.innerHTML = "";

      POSITIONS.forEach(pos => {
        const section = document.createElement("section");
        section.className = "section";

        const head = document.createElement("div");
        head.className = "section-head";
        head.innerHTML = `
          <div>
            <h2>${pos.title} <span class="pill">${state[pos.key].length} players</span></h2>
            <div class="small">Row score = ticks (out of ${QUESTIONS.length})</div>
          </div>
          <div class="add">
            <input id="input-${pos.key}" type="text" placeholder="Add player name…" />
            <button id="btn-${pos.key}">Add</button>
            <button class="danger" id="clear-${pos.key}">Clear ${pos.title}</button>
          </div>
        `;
        section.appendChild(head);

        const wrap = document.createElement("div");
        wrap.className = "table-wrap";

        const table = document.createElement("table");

        // fixed-width columns so each checkbox sits directly under its question header
        const colgroup = document.createElement("colgroup");
        const colName = document.createElement("col"); colName.className = "name"; colgroup.appendChild(colName);
        for(let i=0;i<QUESTIONS.length;i++){ const c=document.createElement("col"); c.className="q"; colgroup.appendChild(c); }
        const colNotes = document.createElement("col"); colNotes.className="notes"; colgroup.appendChild(colNotes);
        const colCount = document.createElement("col"); colCount.className="count"; colgroup.appendChild(colCount);
        const colActions = document.createElement("col"); colActions.className="actions"; colgroup.appendChild(colActions);
        table.appendChild(colgroup);

        const thead = document.createElement("thead");
        const trh = document.createElement("tr");

        const thPlayer = document.createElement("th");
        thPlayer.textContent = "Player";
        trh.appendChild(thPlayer);

        QUESTIONS.forEach((q, idx) => {
          const th = document.createElement("th");
          th.className = "q";
          th.title = QUESTION_TOOLTIPS[idx];
          th.textContent = q;
          trh.appendChild(th);
        });

        const thNotes = document.createElement("th");
        thNotes.textContent = "Notes";
        trh.appendChild(thNotes);

        const thCount = document.createElement("th");
        thCount.className = "count";
        thCount.textContent = "Count";
        trh.appendChild(thCount);

        const thActions = document.createElement("th");
        thActions.className = "actions";
        thActions.textContent = "Remove";
        trh.appendChild(thActions);

        thead.appendChild(trh);
        table.appendChild(thead);

        const tbody = document.createElement("tbody");

        if(state[pos.key].length === 0){
          const trEmpty = document.createElement("tr");
          const td = document.createElement("td");
          td.colSpan = 1 + QUESTIONS.length + 3;
          td.className = "hint";
          td.textContent = "No players yet — add a name above.";
          trEmpty.appendChild(td);
          tbody.appendChild(trEmpty);
        } else {
          state[pos.key].forEach(p => {
            const tr = document.createElement("tr");

            const tdName = document.createElement("td");
            tdName.className = "player";
            tdName.textContent = p.name;
            tr.appendChild(tdName);

            // One TD per question (so checkboxes sit under the right header)
            p.checks.forEach((val, idx) => {
              const td = document.createElement("td");
              td.className = "q";
              const cb = document.createElement("input");
              cb.type = "checkbox";
              cb.checked = !!val;
              cb.addEventListener("change", () => {
                p.checks[idx] = cb.checked;
                saveState(state);
                tdCount.textContent = scorePlayer(p);
              });
              td.appendChild(cb);
              tr.appendChild(td);
            });

            const tdNotes = document.createElement("td");
            const notes = document.createElement("input");
            notes.type = "text";
            notes.className = "notes-input";
            notes.placeholder = "e.g., shares ruck with X; moved to half-forward";
            notes.value = p.notes || "";
            let t=null;
            notes.addEventListener("input", () => {
              clearTimeout(t);
              t=setTimeout(()=>{ p.notes = notes.value; saveState(state); }, 200);
            });
            tdNotes.appendChild(notes);
            tr.appendChild(tdNotes);

            const tdCount = document.createElement("td");
            tdCount.className = "count";
            tdCount.textContent = scorePlayer(p);
            tr.appendChild(tdCount);

            const tdActions = document.createElement("td");
            tdActions.className = "actions";
            const btn = document.createElement("button");
            btn.className = "danger";
            btn.textContent = "Remove";
            btn.addEventListener("click", () => {
              state[pos.key] = state[pos.key].filter(x => x.id !== p.id);
              saveState(state);
              render();
            });
            tdActions.appendChild(btn);
            tr.appendChild(tdActions);

            tbody.appendChild(tr);
          });
        }

        table.appendChild(tbody);
        wrap.appendChild(table);
        section.appendChild(wrap);
        app.appendChild(section);

        const input = section.querySelector(`#input-${pos.key}`);
        const addBtn = section.querySelector(`#btn-${pos.key}`);
        const clearBtn = section.querySelector(`#clear-${pos.key}`);

        function addPlayer(){
          const name = input.value.trim();
          if(!name) return;
          state[pos.key].push(newPlayer(name));
          input.value = "";
          saveState(state);
          render();
        }

        addBtn.addEventListener("click", addPlayer);
        input.addEventListener("keydown", (e) => { if(e.key === "Enter") addPlayer(); });

        clearBtn.addEventListener("click", () => {
          if(!confirm(`Clear all players in ${pos.title}?`)) return;
          state[pos.key] = [];
          saveState(state);
          render();
        });
      });

      updateStickyTop();
    }

    function exportToFile(){
      try{
        const data = JSON.stringify(state, null, 2);
        const blob = new Blob([data], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "afl-watchlist.json";
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        setStatus("Exported: afl-watchlist.json");
      } catch {
        setStatus("Export failed.");
      }
    }

    function importFromFile(file){
      const reader = new FileReader();
      reader.onload = () => {
        try{
          const parsed = JSON.parse(String(reader.result || ""));
          const next = normalizeState(parsed);
          if(!confirm("Import will REPLACE your current watchlist on this device. Continue?")) return;
          state = next;
          saveState(state);
          render();
          setStatus("Import complete.");
        } catch {
          setStatus("Import failed: invalid JSON file.");
        }
      };
      reader.readAsText(file);
    }

    function wipeAll(){
      if(!confirm("This will delete all locally saved watchlist data on this device/browser. Continue?")) return;
      state = defaultState();
      saveState(state);
      render();
      setStatus("Local data wiped.");
    }

    document.getElementById("btn-export").addEventListener("click", exportToFile);
    document.getElementById("btn-import").addEventListener("click", () => document.getElementById("file-import").click());
    document.getElementById("file-import").addEventListener("change", (e) => {
      const file = e.target.files && e.target.files[0];
      if(file) importFromFile(file);
      e.target.value = "";
    });
    document.getElementById("btn-wipe").addEventListener("click", wipeAll);

    render();
    window.addEventListener("resize", updateStickyTop);
  </script>
</body>
</html>
